name: unit_tests

on:
  workflow_run:
    workflows: ["build"]
    types: [completed]
    branches: [main, master]

jobs:
  test_windows:
    name: Test on Windows
    runs-on: windows-2019
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download wheels from build workflow
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: wheels-windows-2019
          path: ./wheelhouse
          run_id: ${{ github.event.workflow_run.id }}
          
      - name: Install dependencies
        run: |
          pip install pytest pillow numpy
        shell: powershell
        
      - name: Install wheel
        run: |
          $wheel = Get-ChildItem -Path "./wheelhouse/*cp313*.whl" -ErrorAction SilentlyContinue | Select-Object -First 1
          Write-Host "Found wheel: $($wheel.FullName)"
          pip install --force-reinstall "$($wheel.FullName)"
        shell: powershell
        
      - name: Run tests
        run: |
          pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: powershell
        
  test_linux:
    runs-on: ubuntu-22.04
    name: Test on Linux
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install X11 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            x11-apps \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxtst-dev \
            libxi-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxcomposite-dev \
            libxkbcommon-dev \
            mesa-utils \
            libgl1-mesa-glx \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            tk \
            python3-tk \
            pkg-config
        shell: bash

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pillow numpy
        shell: bash

      - name: Download wheels
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: wheels-ubuntu-22.04
          path: ./wheelhouse
          run_id: ${{ github.event.workflow_run.id }}

      - name: Install wheel
        run: |
          set -e
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit 2>/dev/null || true)
          echo "Found wheel: $wheel"
          pip install --force-reinstall "$wheel"
        shell: bash

      - name: Run tests with full X11 environment
        run: |
          # Устанавливаем xvfb-run и оконный менеджер
          sudo apt-get install -y xvfb openbox x11-utils
          
          # Создаем минимальную конфигурацию Openbox
          mkdir -p ~/.config/openbox
          cat > ~/.config/openbox/rc.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <openbox_config xmlns="http://openbox.org/3.4/rc">
          <applications>
          <application class="*">
          <decor>yes</decor>
          </application>
          </applications>
          </openbox_config>
          EOF
          
          # Запускаем тесты через xvfb-run с оконным менеджером
          xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" \
          openbox --startup "python -m pytest tests/ -v" &
          
          TEST_PID=$!
          
          # Ждем завершения тестов
          wait $TEST_PID
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: bash

      - name: Debug Xvfb
        if: failure()
        run: |
          echo "Xvfb debug info:"
          ps aux | grep Xvfb
          echo "Display info:"
          xdpyinfo -display :99 || echo "Cannot connect to display"
        shell: bash