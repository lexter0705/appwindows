name: unit_tests

on:
  workflow_run:
    workflows: ["build"]
    types: [completed]
    branches: [main, master]

jobs:
  test_windows:
    name: Test on Windows
    runs-on: windows-2019
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download wheels from build workflow
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: wheels-windows-2019
          path: ./wheelhouse
          run_id: ${{ github.event.workflow_run.id }}

      - name: Install dependencies
        run: |
          pip install pytest pillow numpy

      - name: Install wheel
        shell: powershell
        run: |
          $wheel = Get-ChildItem -Path "./wheelhouse/*cp313*.whl" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wheel) {
            Write-Host "Found wheel: $($wheel.FullName)"
            pip install --force-reinstall "$($wheel.FullName)"
          } else {
            Write-Error "❌ No wheel found for Python 3.13"
            Write-Host "Available files in wheelhouse:"
            Get-ChildItem -Path "./wheelhouse"
            exit 1
          }

      - name: Run tests
        run: |
          pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

  test_linux:
    name: Test on Linux with XFCE Docker
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download wheels from build workflow
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: wheels-ubuntu-22.04
          path: ./wheelhouse
          run_id: ${{ github.event.workflow_run.id }}

      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
          sudo systemctl start docker
          sudo usermod -aG docker $USER
          newgrp docker

      - name: Run tests in XFCE Docker container
        run: |
          docker run -it --rm \
            --env="DISPLAY" \
            --volume="/tmp/.X11-unix:/tmp/.X11-unix" \
            --volume="$(pwd):/app" \
            --workdir="/app" \
            x11docker/xfce:latest \
            bash -c "
              pip install pytest pillow numpy
              wheel=\$(find ./wheelhouse -name \"*cp313*.whl\" -print -quit)
              pip install --force-reinstall \"\$wheel\"
              pytest tests/ -v
            "