# .github/workflows/unit_tests.yml
name: unit_tests

on:
  repository_dispatch:
    types: [build_completed]

jobs:
  test_windows:
    name: Test on Windows
    runs-on: windows-2019
    if: ${{ github.event.client_payload.ref_name == 'main' || github.event.client_payload.ref_name == 'master' || github.event.client_payload.ref_name == 'apple_develop' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download wheels from build workflow
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: wheels-windows-2019
          path: ./wheelhouse
          run_id: ${{ github.event.client_payload.run_id }}

      - name: Install dependencies
        run: pip install pytest pillow numpy
        shell: powershell

      - name: Install wheel
        run: |
          $wheel = Get-ChildItem -Path "./wheelhouse/*cp313*.whl" -ErrorAction SilentlyContinue | Select-Object -First 1
          Write-Host "Found wheel: $($wheel.FullName)"
          pip install --force-reinstall "$($wheel.FullName)"
        shell: powershell

      - name: Run tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: powershell

  test_linux:
    runs-on: ubuntu-22.04
    name: Test on Linux
    if: ${{ github.event.client_payload.ref_name == 'main' || github.event.client_payload.ref_name == 'master' || github.event.client_payload.ref_name == 'apple_develop' }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install X11 utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xterm xdotool wmctrl zenity yad
        shell: bash

      - name: Install Python dependencies
        run: pip install pytest pillow numpy
        shell: bash

      - name: Download wheels
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: wheels-ubuntu-22.04
          path: ./wheelhouse
          run_id: ${{ github.event.client_payload.run_id }}

      - name: Install wheel
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          pip install --force-reinstall "$wheel"
        shell: bash

      - name: Run tests with xterm windows
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          sleep 2
          python -m pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          DISPLAY: ":99"
        shell: bash

  test_macos:
    name: Test on MacOS
    if: ${{ github.event.client_payload.ref_name == 'main' || github.event.client_payload.ref_name == 'master' || github.event.client_payload.ref_name == 'apple_develop' }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download wheels
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: wheels-macos-14
          path: ./wheelhouse
          run_id: ${{ github.event.client_payload.run_id }}

      - name: Install test dependencies
        run: pip install pytest PySide6

      - name: Install arm64 wheel only
        run: pip install wheelhouse/*cp313*arm64*.whl

      - name: Run tests
        run: pytest tests/ -v -s --log-cli-level=20
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Clean up any remaining test windows
        run: osascript -e 'tell application "Finder" to close every window'