name: unit_tests

on:
  workflow_run:
    workflows: ["build"]
    types: [completed]
    branches: [main, master]

jobs:
  test_windows:
    name: Test on Windows
    runs-on: windows-2019
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download wheels from build workflow
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: wheels-windows-2019
          path: ./wheelhouse
          run_id: ${{ github.event.workflow_run.id }}
          
      - name: Install dependencies
        run: |
          pip install pytest pillow numpy
        shell: powershell
        
      - name: Install wheel
        run: |
          $wheel = Get-ChildItem -Path "./wheelhouse/*cp313*.whl" -ErrorAction SilentlyContinue | Select-Object -First 1
          Write-Host "Found wheel: $($wheel.FullName)"
          pip install --force-reinstall "$($wheel.FullName)"
        shell: powershell
        
      - name: Run tests
        run: |
          pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: powershell
        
  test_linux:
    runs-on: ubuntu-22.04
    name: Test on Linux
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install X11 and window manager dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            libx11-dev \
            libxext-dev \
            libxtst-dev \
            libxi-dev \
            libxinerama-dev \
            mesa-utils \
            libgl1-mesa-glx \
            tk \
            python3-tk \
            fluxbox \
            wmctrl
        shell: bash

      - name: Install Python dependencies
        run: |
          pip install pytest pillow numpy
        shell: bash

      - name: Download wheels
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: wheels-ubuntu-22.04
          path: ./wheelhouse
          run_id: ${{ github.event.workflow_run.id }}

      - name: Install wheel
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          pip install --force-reinstall "$wheel"
        shell: bash

      - name: Run tests with Xvfb and window manager
        run: |
          # Start Xvfb with required extensions
          Xvfb :99 -screen 0 1024x768x24 +extension RANDR +extension GLX +extension XINERAMA +extension XFIXES &
          XVFB_PID=$!
          export DISPLAY=:99
          sleep 3
          
          # Start window manager
          fluxbox &
          FLUXBOX_PID=$!
          sleep 2
          
          # Run tests
          python -m pytest tests/ -v
          
          # Cleanup
          kill $FLUXBOX_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true
        env:
          PYTHONPATH: ${{ github.workspace }}
          DISPLAY: ":99"
        shell: bash