name: apple_build

on:
  push:
    branches: [ apple_develop ]
  pull_request:
    branches: [ apple_develop ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build macOS wheels
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build tools
        run: |
          brew install cairo
          brew install --cask xquartz
          pip install meson-python cibuildwheel

      - name: Build for arm64
        run: |
          python -m cibuildwheel --output-dir wheelhouse-arm64 --platform macos
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ENVIRONMENT_MACOS: |
            MACOSX_DEPLOYMENT_TARGET=12.0
            LDFLAGS="-framework ApplicationServices"
            ARCHFLAGS="-arch arm64"
          CIBW_BEFORE_BUILD_MACOS: |
            pip install pybind11

      - name: Build for x86_64
        run: |
          python -m cibuildwheel --output-dir wheelhouse-x86_64 --platform macos
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_ARCHS_MACOS: "x86_64"
          CIBW_ENVIRONMENT_MACOS: |
            MACOSX_DEPLOYMENT_TARGET=12.0
            LDFLAGS="-framework ApplicationServices"
            ARCHFLAGS="-arch x86_64"
          CIBW_BEFORE_BUILD_MACOS: |
            pip install pybind11

      - name: Combine wheels
        run: |
          mkdir -p wheelhouse
          cp wheelhouse-arm64/*.whl wheelhouse/
          cp wheelhouse-x86_64/*.whl wheelhouse/

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-wheels
          path: ./wheelhouse/*.whl
          retention-days: 7

  test_macos:
    name: Test on MacOS
    runs-on: macos-latest
    needs: build_wheels
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download wheels from build job
        uses: actions/download-artifact@v4
        with:
          name: macos-wheels
          path: ./wheelhouse

      - name: Install test dependencies
        run: |
          pip install pytest PySide6

      - name: Install arm64 wheel only
        run: |
          pip install wheelhouse/*arm64*.whl

      - name: Run tests
        run: |
          pytest tests/ -v -s --log-cli-level=20
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Clean up any remaining test windows
        run: |
          osascript -e 'tell application "Finder" to close every window'