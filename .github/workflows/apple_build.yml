name: apple_build

on:
  push:
    branches: [ apple_develop ]
  pull_request:
    branches: [ apple_develop ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build macOS wheels (x86_64 & arm64)
    runs-on: macos-14
    strategy:
      matrix:
        arch: [x86_64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build tools
        run: |
          pip install meson-python cibuildwheel

      - name: Build macOS wheel for ${{ matrix.arch }}
        run: |
          python -m cibuildwheel --output-dir wheelhouse --platform macos
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}
          CIBW_ENVIRONMENT_MACOS: |
            MACOSX_DEPLOYMENT_TARGET=12.0
            LDFLAGS="-framework ApplicationServices"
            ARCHFLAGS="-arch ${{ matrix.arch }}"
          CIBW_BEFORE_BUILD_MACOS: |
            pip install pybind11
          CIBW_TEST_SKIP: "*_arm64"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: macos-wheels-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          retention-days: 7