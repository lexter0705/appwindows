name: Build and Test Wheels

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: |
          pip install cibuildwheel==3.3.0

      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Install delvewheel (Windows only)
        if: runner.os == 'Windows'
        run: pip install delvewheel

      - name: Install X11 dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxtst-dev \
            libxi-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxcomposite-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            pkg-config

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64
          CIBW_BEFORE_BUILD_LINUX: |
            yum install -y \
              libX11-devel \
              libXext-devel \
              libXrender-devel \
              libXtst-devel \
              libXi-devel \
              libXinerama-devel \
              libXcursor-devel \
              libXrandr-devel \
              libXfixes-devel \
              libXdamage-devel \
              libXcomposite-devel \
              libxkbcommon-devel \
              mesa-libGL-devel \
              mesa-libEGL-devel \
              libgbm-devel \
              pkgconfig
          CIBW_BEFORE_BUILD_WINDOWS: "pip install meson ninja pybind11"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_ENVIRONMENT_WINDOWS: >
            PYBIND11_INCLUDE="${{ github.workspace }}/pybind11/include"
            PYBIND11_ABI=1

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  test_wheels:
    name: Test on ${{ matrix.os }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install pytest pillow numpy

      - name: Install X11 runtime dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxtst6 \
            libxi6 \
            libxinerama1 \
            libxcursor1 \
            libxrandr2 \
            libxfixes3 \
            libxdamage1 \
            libxcomposite1 \
            libxkbcommon0 \
            libgl1-mesa-glx \
            libegl1-mesa \
            libgbm1 \
            xvfb \
            xauth \
            x11-apps \
            x11-utils \
            python3-tk \
            libtk8.6 \
            libtcl8.6
            
          pip install pytest pytest-timeout pillow numpy

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse

      - name: Install wheel
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          pip install --force-reinstall "$wheel"
        shell: bash

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Setup X11 environment for tkinter (Linux)
        if: runner.os == 'Linux'
        run: |
          # Создаем отдельную директорию для логов
          mkdir -p /tmp/xvfb_logs
          LOG_FILE="/tmp/xvfb_logs/xvfb_$(date +%s).log"
          
          # Проверяем наличие Xvfb
          if ! command -v Xvfb &> /dev/null; then
            echo "::error::Xvfb is not installed"
            exit 1
          fi
          
          # Очищаем старые lock файлы
          echo "Cleaning up old X11 lock files..."
          sudo rm -f /tmp/.X*-lock || true
          sudo rm -rf /tmp/.X11-unix/* || true
          
          # Устанавливаем правильные права
          sudo mkdir -p /tmp/.X11-unix
          sudo chmod 1777 /tmp/.X11-unix
          sudo chown root:root /tmp/.X11-unix
          
          # Создаем Xauthority файл
          export XAUTHORITY=$(mktemp /tmp/.Xauthority.XXXXXX)
          chmod 600 $XAUTHORITY
          
          # Генерируем авторизацию
          mcookie_value=$(mcookie)
          xauth -f $XAUTHORITY add :99 . $mcookie_value
          
          echo "Starting Xvfb with display :99..."
          echo "XAUTHORITY file: $XAUTHORITY"
          echo "Using mcookie: $mcookie_value"
          
          # Запускаем Xvfb с альтернативными параметрами
          sudo -E Xvfb :99 \
            -screen 0 1024x768x24 \
            -ac \
            -noreset \
            -auth $XAUTHORITY \
            -logfile "$LOG_FILE" \
            -verbose \
            +extension GLX \
            +extension MIT-SHM \
            +extension XINERAMA \
            +extension XFIXES \
            +extension DAMAGE \
            +extension COMPOSITE \
            +extension XTEST \
            +render \
            unix:/tmp/.X11-unix/X99 &
          
          XVFB_PID=$!
          echo "Xvfb started with PID: $XVFB_PID"
          
          # Ждем инициализации
          sleep 2
          
          # Проверяем, запущен ли процесс
          if ! ps -p $XVFB_PID > /dev/null; then
            echo "::error::Xvfb process died immediately"
            echo "Log file contents:"
            cat "$LOG_FILE" || echo "Log file not found"
            echo "Process list:"
            ps aux | grep -E 'Xvfb|Xorg'
            exit 1
          fi
          
          # Устанавливаем переменные окружения
          export DISPLAY=:99
          
          echo "Checking X server accessibility..."
          for i in {1..20}; do
            sleep 1
            if xdpyinfo -display $DISPLAY > /dev/null 2>&1; then
              echo "✅ X server is accessible on display $DISPLAY"
              break
            else
              echo "⏳ Attempt $i/20: X server not yet accessible"
              if [ $i -eq 20 ]; then
                echo "::error::X server did not become accessible after 20 attempts"
                echo "Final log file contents:"
                cat "$LOG_FILE" || true
                echo "Process status:"
                ps -p $XVFB_PID -f || true
                echo "X11 socket directory contents:"
                ls -la /tmp/.X11-unix || true
                echo "XAUTHORITY contents:"
                xauth -f $XAUTHORITY list || true
                exit 1
              fi
            fi
          done
          
          # Тест для tkinter
          echo "Testing tkinter window creation with DISPLAY=$DISPLAY"
          python -c "
          import tkinter as tk
          import time
          import os
          import sys
          
          print(f'DISPLAY: {os.environ.get(\"DISPLAY\", \"not set\")}')
          print(f'XAUTHORITY: {os.environ.get(\"XAUTHORITY\", \"not set\")}')
          print('Creating tkinter test window...')
          
          try:
            root = tk.Tk()
            root.title('Tkinter Test')
            root.geometry('400x300+100+100')
            label = tk.Label(root, text='✅ Tkinter window created successfully!', font=('Arial', 14))
            label.pack(pady=20)
            
            button = tk.Button(root, text='Close', command=root.destroy)
            button.pack(pady=10)
            
            root.update()
            print('✅ Tkinter window created and updated')
            
            # Сохраняем скриншот для отладки
            root.after(1000, root.destroy)
            root.mainloop()
            
            print('✅ Tkinter test completed successfully')
            sys.exit(0)
            
          except Exception as e:
            print(f'❌ Tkinter test failed: {e}')
            import traceback
            traceback.print_exc()
            sys.exit(1)
          "
          
          # Проверяем окна через X11
          echo "Listing X11 windows..."
          xwininfo -root -tree -display $DISPLAY || true
          
          # Сохраняем переменные для следующих шагов
          echo "XVFB_PID=$XVFB_PID" >> $GITHUB_ENV
          echo "DISPLAY=$DISPLAY" >> $GITHUB_ENV
          echo "XAUTHORITY=$XAUTHORITY" >> $GITHUB_ENV
          echo "XVFB_LOG=$LOG_FILE" >> $GITHUB_ENV
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run tests with X11 access (Linux)
        if: runner.os == 'Linux'
        run: |
          # Дополнительные переменные для отладки
          export XLIB_SKIP_ARGB_VISUALS=1
          export GDK_BACKEND=x11
          
          echo "Running tests with DISPLAY=$DISPLAY"
          echo "Using XAUTHORITY=$XAUTHORITY"
          
          # Запускаем тесты с подробным выводом
          pytest tests/ -v --capture=no --full-trace
        env:
          PYTHONPATH: ${{ github.workspace }}
          DISPLAY: ${{ env.DISPLAY }}
          XAUTHORITY: ${{ env.XAUTHORITY }}

      - name: Cleanup X11 environment (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Cleaning up X11 environment..."
          
          # Показываем логи Xvfb для отладки
          if [ -n "$XVFB_LOG" ] && [ -f "$XVFB_LOG" ]; then
            echo "=== Xvfb Log Contents ==="
            cat "$XVFB_LOG" || true
            echo "========================="
          fi
          
          # Останавливаем Xvfb
          if [ -n "$XVFB_PID" ] && ps -p $XVFB_PID > /dev/null; then
            echo "Stopping Xvfb process (PID: $XVFB_PID)..."
            sudo kill -TERM $XVFB_PID || sudo kill -KILL $XVFB_PID || true
            wait $XVFB_PID 2>/dev/null || true
          fi
          
          # Удаляем XAUTHORITY файл
          if [ -n "$XAUTHORITY" ] && [ -f "$XAUTHORITY" ]; then
            echo "Removing XAUTHORITY file: $XAUTHORITY"
            rm -f $XAUTHORITY || true
          fi
          
          # Очищаем lock файлы
          sudo rm -f /tmp/.X99-lock || true
          sudo rm -rf /tmp/.X11-unix/X99 || true
          
          # Очищаем временные файлы
          sudo rm -rf /tmp/xvfb_logs || true
        env:
          PYTHONPATH: ${{ github.workspace }}
          XVFB_PID: ${{ env.XVFB_PID }}
          XAUTHORITY: ${{ env.XAUTHORITY }}
          XVFB_LOG: ${{ env.XVFB_LOG }}
