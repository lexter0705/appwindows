name: Build and Test Wheels

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: |
          pip install cibuildwheel==3.3.0

      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Install delvewheel (Windows only)
        if: runner.os == 'Windows'
        run: pip install delvewheel

      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev pkg-config libxext-dev libxrender-dev libxtst-dev libxi-dev

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_SKIP: "*-musllinux_* pp* *-win32 *-i686"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64
          CIBW_BEFORE_BUILD_LINUX: "yum install -y libX11-devel libXext-devel pkgconfig"
          CIBW_BEFORE_BUILD_WINDOWS: "pip install meson ninja pybind11"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_ENVIRONMENT_WINDOWS: >
            PYBIND11_INCLUDE="${{ github.workspace }}/pybind11/include"
            PYBIND11_ABI=1

      - name: List built wheels (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Built wheels:"
          ls -la ./wheelhouse/
          echo "Wheel files:"
          find ./wheelhouse -name "*.whl"

      - name: List built wheels (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "Built wheels:"
          dir ./wheelhouse/
          echo "Wheel files:"
          find ./wheelhouse -name "*.whl"

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  test_wheels:
    name: Test on ${{ matrix.os }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb libgtk-3-0 libgbm-dev libxshmfence-dev libx11-dev libxext-dev
          pip install pytest pillow numpy

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install pytest pillow numpy

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse

      - name: List downloaded wheels (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Downloaded wheels:"
          ls -la ./wheelhouse/
          echo "Wheel files:"
          find ./wheelhouse -name "*.whl"

      - name: List downloaded wheels (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "Downloaded wheels:"
          dir ./wheelhouse/
          echo "Wheel files:"
          find ./wheelhouse -name "*.whl"

      - name: Install wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          echo "Testing wheel: $wheel"
          pip install --force-reinstall "$wheel"

      - name: Install wheel (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          echo "Testing wheel: $wheel"
          pip install --force-reinstall "$wheel"

      - name: Run tests with Xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a --server-args="-screen 0 1024x768x24" pytest tests/ -v
        env:
          DISPLAY: :99.0
          PYTHONPATH: ${{ github.workspace }}

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}