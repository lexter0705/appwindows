name: Build and Test Wheels

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: |
          pip install cibuildwheel==3.3.0

      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Install delvewheel (Windows only)
        if: runner.os == 'Windows'
        run: pip install delvewheel

      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev pkg-config libxext-dev libxrender-dev libxtst-dev libxi-dev libgbm-dev libxshmfence-dev libgl1-mesa-glx libgl1-mesa-dri

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64
          CIBW_BEFORE_BUILD_LINUX: "yum install -y libX11-devel libXext-devel pkgconfig"
          CIBW_BEFORE_BUILD_WINDOWS: "pip install meson ninja pybind11"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_ENVIRONMENT_WINDOWS: >
            PYBIND11_INCLUDE="${{ github.workspace }}/pybind11/include"
            PYBIND11_ABI=1

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  test_wheels:
    name: Test on ${{ matrix.os }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install pytest pillow numpy

      - name: Install dependencies (Linux) - GUI version
        if: runner.os == 'Linux'
        run: |
          # Установка всех необходимых GUI зависимостей
          sudo apt-get update
          sudo apt-get install -y \
            python3-tk \
            xvfb \
            xauth \
            libxrender1 \
            libxtst6 \
            libxi6 \
            libgl1-mesa-glx \
            libgl1-mesa-dri \
            libgbm-dev \
            libxshmfence-dev \
            libxkbcommon0 \
            libwayland-client0 \
            libwayland-server0 \
            libegl1-mesa \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libdrm-dev \
            libdrm2 \
            libdrm-amdgpu1 \
            libdrm-intel1 \
            libdrm-nouveau2 \
            libdrm-radeon1 \
            libx11-xcb1 \
            libxcb-dri2-0 \
            libxcb-dri3-0 \
            libxcb-glx0 \
            libxcb-present0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxshmfence1
          
          # Установка Python зависимостей
          pip install pytest pytest-xvfb pytest-timeout pillow numpy
          
          # Отладка: проверка установки tkinter
          python -c "import tkinter; print('Tkinter version:', tkinter.TkVersion); print('Tcl version:', tkinter.TclVersion)"

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse

      - name: Install wheel (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          echo "Testing wheel: $wheel"
          pip install --force-reinstall "$wheel"

      - name: Install wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          echo "Testing wheel: $wheel"
          pip install --force-reinstall "$wheel"

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Setup Xvfb environment (Linux)
        if: runner.os == 'Linux'
        run: |
          export XAUTHORITY=$(mktemp /tmp/.Xauthority.XXXXXX)
          chmod 600 $XAUTHORITY
          echo "Starting Xvfb..."
          Xvfb :99 -screen 0 1024x768x24 -ac +extension GLX +render -noreset -listen tcp &
          XVFB_PID=$!
          sleep 3
          if ! ps -p $XVFB_PID > /dev/null; then
            echo "::error::Xvfb failed to start"
            exit 1
          fi
          export DISPLAY=:99
          export XAUTHORITY=$XAUTHORITY
          echo "Display: $DISPLAY"
          echo "XAUTHORITY: $XAUTHORITY"
          xdpyinfo || echo "xdpyinfo failed (expected in headless mode)"
          python -c "
            import sys
            import tkinter as tk
          try:
            root = tk.Tk()
            root.title('Test Window')
            root.geometry('200x100')
            label = tk.Label(root, text='Hello from CI!')
            label.pack(pady=20)
            root.update_idletasks()
            root.update()
            print('✅ Tkinter window created successfully')
            root.destroy()
          except Exception as e:
            print(f'❌ Tkinter failed: {e}')
              sys.exit(1)
          "
          
          # Сохраняем PID для последующего завершения
          echo "XVFB_PID=$XVFB_PID" >> $GITHUB_ENV
          echo "DISPLAY=$DISPLAY" >> $GITHUB_ENV
          echo "XAUTHORITY=$XAUTHORITY" >> $GITHUB_ENV
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run GUI tests with timeout (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Running GUI tests with pytest-xvfb..."
          
          # Запускаем тесты с таймаутом и детальным выводом
          pytest tests/ \
            -v \
            --capture=no \
            --timeout=30 \
            --no-header \
            --no-summary \
            -k "not slow"  # Исключаем медленные тесты если нужно
        env:
          PYTHONPATH: ${{ github.workspace }}
          DISPLAY: ${{ env.DISPLAY }}
          XAUTHORITY: ${{ env.XAUTHORITY }}
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu:/usr/lib

      - name: Cleanup Xvfb (Linux)
        if: runner.os == 'Linux' && env.XVFB_PID != ''
        run: |
          echo "Cleaning up Xvfb process..."
          if [ -n "$XVFB_PID" ] && ps -p $XVFB_PID > /dev/null; then
            kill $XVFB_PID || true
            wait $XVFB_PID || true
          fi
          if [ -n "$XAUTHORITY" ] && [ -f "$XAUTHORITY" ]; then
            rm -f $XAUTHORITY || true
          fi