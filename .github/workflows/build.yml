name: Build and Test Wheels

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: |
          pip install cibuildwheel==3.3.0

      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Install delvewheel (Windows only)
        if: runner.os == 'Windows'
        run: pip install delvewheel

      - name: Install X11 dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxtst-dev \
            libxi-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxcomposite-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            pkg-config

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64
          CIBW_BEFORE_BUILD_LINUX: |
            yum install -y \
              libX11-devel \
              libXext-devel \
              libXrender-devel \
              libXtst-devel \
              libXi-devel \
              libXinerama-devel \
              libXcursor-devel \
              libXrandr-devel \
              libXfixes-devel \
              libXdamage-devel \
              libXcomposite-devel \
              libxkbcommon-devel \
              mesa-libGL-devel \
              mesa-libEGL-devel \
              libgbm-devel \
              pkgconfig
          CIBW_BEFORE_BUILD_WINDOWS: "pip install meson ninja pybind11"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_ENVIRONMENT_WINDOWS: >
            PYBIND11_INCLUDE="${{ github.workspace }}/pybind11/include"
            PYBIND11_ABI=1

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  test_wheels:
    name: Test on ${{ matrix.os }}
    needs: build_wheels
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      matrix:
        os: [linux, windows]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13 (Windows)
        if: matrix.os == 'windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows'
        run: |
          pip install pytest pillow numpy

      - name: Download wheels (Windows)
        if: matrix.os == 'windows'
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-2019
          path: ./wheelhouse

      - name: Install wheel (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          pip install --force-reinstall "$wheel"

      - name: Run tests (Windows)
        if: matrix.os == 'windows'
        run: |
          pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Download wheels (Linux)
        if: matrix.os == 'linux'
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-22.04
          path: ./wheelhouse

      - name: Build and run XFCE Docker container (Linux)
        if: matrix.os == 'linux'
        run: |
          # Создаем Dockerfile
          cat > Dockerfile << 'EOF'
          FROM ubuntu:22.04
          
          ENV DEBIAN_FRONTEND=noninteractive
          
          # Установка базовых зависимостей
          RUN apt-get update && \
              apt-get install -y \
              sudo \
              apt-utils \
              ca-certificates \
              curl \
              wget \
              git \
              python3 \
              python3-pip \
              python3-dev \
              python3-tk \
              libpython3-dev \
              xvfb \
              xauth \
              x11-apps \
              x11-utils \
              libx11-6 \
              libxext6 \
              libxrender1 \
              libxtst6 \
              libxi6 \
              libxinerama1 \
              libxcursor1 \
              libxrandr2 \
              libxfixes3 \
              libxdamage1 \
              libxcomposite1 \
              libxkbcommon0 \
              libgl1-mesa-glx \
              libegl1-mesa \
              libgbm1 \
              libxshmfence1 \
              libtk8.6 \
              libtcl8.6 \
              && rm -rf /var/lib/apt/lists/*
          
          # Установка XFCE
          RUN apt-get update && \
              apt-get install -y \
              xorg \
              xfce4 \
              xfce4-goodies \
              xfwm4 \
              xfce4-panel \
              xfce4-session \
              xfce4-settings \
              xfdesktop4 \
              thunar \
              && rm -rf /var/lib/apt/lists/*
          
          # Установка Python зависимостей
          RUN pip3 install --upgrade pip && \
              pip3 install pytest pytest-timeout pillow numpy
          
          # Создание пользователя
          RUN useradd -m -s /bin/bash runner && \
              echo "runner ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          USER runner
          WORKDIR /home/runner
          
          # Скрипт запуска
          COPY start-x11.sh /home/runner/start-x11.sh
          RUN chmod +x /home/runner/start-x11.sh
          
          # Копирование кода и wheels
          COPY . /home/runner/app
          WORKDIR /home/runner/app
          
          CMD ["/home/runner/start-x11.sh"]
          EOF
          
          # Создаем скрипт запуска X11
          cat > start-x11.sh << 'EOF'
          #!/bin/bash
          
          set -e
          
          echo "Starting X11 server..."
          
          # Создаем конфигурацию X server
          mkdir -p ~/.config/xfce4
          
          # Запускаем X server
          sudo Xorg -noreset +extension GLX +extension RANDR +extension RENDER -logfile ./xorg.log :1 &
          XVFB_PID=$!
          echo "X server started with PID: $XVFB_PID"
          
          sleep 5
          
          # Устанавливаем переменные окружения
          export DISPLAY=:1
          export XAUTHORITY=/home/runner/.Xauthority
          
          # Создаем Xauthority файл
          xauth generate $DISPLAY . trusted
          
          echo "Starting XFCE session..."
          
          # Запускаем XFCE session
          startxfce4 &
          XFCE_PID=$!
          echo "XFCE session started with PID: $XFCE_PID"
          
          sleep 10
          
          echo "X11 environment is ready"
          echo "DISPLAY: $DISPLAY"
          echo "XAUTHORITY: $XAUTHORITY"
          
          # Устанавливаем wheel
          WHEEL=$(find /home/runner/app/wheelhouse -name "*cp313*.whl" -print -quit)
          echo "Installing wheel: $WHEEL"
          pip install --force-reinstall "$WHEEL"
          
          # Устанавливаем PYTHONPATH
          export PYTHONPATH=/home/runner/app
          
          # Запускаем тесты
          echo "Running tests..."
          pytest /home/runner/app/tests/ -v --capture=no
          
          # Очищаем
          echo "Cleaning up..."
          kill $XFCE_PID || true
          sudo kill $XVFB_PID || true
          
          exit 0
          EOF
          
          # Собираем Docker образ
          echo "Building Docker image..."
          docker build -t appwindows-test .
          
          # Запускаем контейнер
          echo "Running Docker container..."
          docker run --privileged \
            --env DISPLAY=$DISPLAY \
            --volume /tmp/.X11-unix:/tmp/.X11-unix \
            --volume $(pwd):/home/runner/app \
            -t appwindows-test