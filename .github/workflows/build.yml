name: Build and Test Wheels

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: |
          pip install cibuildwheel==3.3.0

      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Install delvewheel (Windows only)
        if: runner.os == 'Windows'
        run: pip install delvewheel

      - name: Install X11 dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxtst-dev \
            libxi-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxcomposite-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            pkg-config

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64
          CIBW_BEFORE_BUILD_LINUX: |
            yum install -y \
              libX11-devel \
              libXext-devel \
              libXrender-devel \
              libXtst-devel \
              libXi-devel \
              libXinerama-devel \
              libXcursor-devel \
              libXrandr-devel \
              libXfixes-devel \
              libXdamage-devel \
              libXcomposite-devel \
              libxkbcommon-devel \
              mesa-libGL-devel \
              mesa-libEGL-devel \
              libgbm-devel \
              pkgconfig
          CIBW_BEFORE_BUILD_WINDOWS: "pip install meson ninja pybind11"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_ENVIRONMENT_WINDOWS: >
            PYBIND11_INCLUDE="${{ github.workspace }}/pybind11/include"
            PYBIND11_ABI=1

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  test_wheels:
    name: Test on ${{ matrix.os }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install pytest pillow numpy

      - name: Install X11 runtime dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxtst6 \
            libxi6 \
            libxinerama1 \
            libxcursor1 \
            libxrandr2 \
            libxfixes3 \
            libxdamage1 \
            libxcomposite1 \
            libxkbcommon0 \
            libgl1-mesa-glx \
            libegl1-mesa \
            libgbm1 \
            xvfb \
            xauth \
            x11-apps \
            python3-tk
          
          pip install pytest pytest-timeout pillow numpy

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse

      - name: Install wheel
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          pip install --force-reinstall "$wheel"
        shell: bash

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run tests with Xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          # Запуск Xvfb с необходимыми расширениями для X11
          Xvfb :99 -screen 0 1024x768x24 -ac +extension GLX +extension MIT-SHM +extension XINERAMA +extension XFIXES +extension DAMAGE +extension COMPOSITE +render -noreset &
          XVFB_PID=$!
          
          # Ждем инициализации
          sleep 2
          
          # Устанавливаем переменные окружения
          export DISPLAY=:99
          export XAUTHORITY=$(mktemp)
          
          # Запускаем тесты
          pytest tests/ -v
          
          # Очищаем
          kill $XVFB_PID
        env:
          PYTHONPATH: ${{ github.workspace }}