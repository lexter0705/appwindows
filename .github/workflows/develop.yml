name: develop

on:
  push:
    branches: [develop, apple_develop]
  pull_request:
    branches: [develop, apple_develop]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2019, macos-14]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: pip install cibuildwheel>=3.3.0

      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1

      - name: Install delvewheel (Windows only)
        if: runner.os == 'Windows'
        run: pip install delvewheel

      - name: Build wheels AMD64/x86_64
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64
          CIBW_BEFORE_BUILD_LINUX: |
            yum install -y \
              libX11-devel \
              libXext-devel \
              libXrender-devel \
              libXtst-devel \
              libXi-devel \
              libXinerama-devel \
              libXcursor-devel \
              libXrandr-devel \
              libXfixes-devel \
              libXdamage-devel \
              libXcomposite-devel \
              libxkbcommon-devel \
              mesa-libGL-devel \
              mesa-libEGL-devel \
              libgbm-devel \
              pkgconfig
          CIBW_BEFORE_BUILD_WINDOWS: "pip install meson ninja pybind11"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --wheel-dir {dest_dir} {wheel}"
          CIBW_ENVIRONMENT_WINDOWS: >
            PYBIND11_INCLUDE="${{ github.workspace }}/pybind11/include"
            PYBIND11_ABI=1
          CIBW_ARCHS_MACOS: "x86_64"
          CIBW_ENVIRONMENT_MACOS: |
            MACOSX_DEPLOYMENT_TARGET=12.0
            LDFLAGS="-framework Foundation -framework AppKit -framework ApplicationServices -framework Accessibility"
            ARCHFLAGS="-arch x86_64"
          CIBW_BEFORE_BUILD_MACOS: |
            pip install pybind11

      - name: Build wheels ARM64 (macOS only)
        if: runner.os == 'Darwin'
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ENVIRONMENT_MACOS: |
            MACOSX_DEPLOYMENT_TARGET=12.0
            LDFLAGS="-framework Foundation -framework AppKit -framework ApplicationServices -framework Accessibility"
            ARCHFLAGS="-arch arm64"
          CIBW_BEFORE_BUILD_MACOS: |
            pip install pybind11

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  test_windows:
    name: Test on Windows (Python 3.13)
    needs: build_wheels
    runs-on: windows-2019
    if: ${{ needs.build_wheels.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-2019
          path: ./wheelhouse

      - name: Install test dependencies
        run: pip install pytest pillow numpy
        shell: powershell

      - name: Install wheel
        run: |
          $wheel = Get-ChildItem -Path "./wheelhouse/*cp313*.whl" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $wheel) {
            Write-Error "No cp313 wheel found in ./wheelhouse"
            exit 1
          }
          Write-Host "Installing wheel: $($wheel.FullName)"
          pip install --force-reinstall "$($wheel.FullName)"
        shell: powershell

      - name: Run tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}
        shell: powershell

  test_linux:
    name: Test on Linux (Python 3.13)
    needs: build_wheels
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: ${{ needs.build_wheels.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install X11 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xterm \
            xdotool \
            wmctrl \
            zenity \
            yad

      - name: Install test dependencies
        run: pip install pytest pillow numpy

      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-22.04
          path: ./wheelhouse

      - name: Install wheel
        run: |
          wheel=$(find ./wheelhouse -name "*cp313*.whl" -print -quit)
          if [ -z "$wheel" ]; then
            echo "Error: No cp313 wheel found in ./wheelhouse"
            exit 1
          fi
          echo "Installing wheel: $wheel"
          pip install --force-reinstall "$wheel"

      - name: Run tests with Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          XVFB_PID=$!
          sleep 2
          export DISPLAY=:99
          
          pytest tests/ -v || EXIT_CODE=$?
          
          kill $XVFB_PID
          wait $XVFB_PID 2>/dev/null || true
          
          exit ${EXIT_CODE:-0}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DISPLAY: ":99"

  test_macos:
    name: Test on macOS (Python 3.13)
    needs: build_wheels
    runs-on: macos-14
    if: ${{ needs.build_wheels.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos-14
          path: ./wheelhouse

      - name: Install test dependencies
        run: pip install pytest PySide6

      - name: Install appropriate wheel (match runner architecture)
        run: |
          # Определяем архитектуру runner'а
          ARCH=$(uname -m)
          if [[ "$ARCH" == "arm64" || "$ARCH" == "ARM64" ]]; then
            WHEEL_PATTERN="*cp313*arm64*.whl"
          else
            WHEEL_PATTERN="*cp313*x86_64*.whl"
          fi
          
          wheel=$(find ./wheelhouse -name "$WHEEL_PATTERN" -print -quit)
          if [ -z "$wheel" ]; then
            echo "Error: No matching cp313 wheel found for architecture $ARCH"
            ls -la ./wheelhouse/
            exit 1
          fi
          
          echo "Installing wheel for $ARCH: $wheel"
          pip install --force-reinstall "$wheel"

      - name: Run tests
        run: pytest tests/ -v -s --log-cli-level=20
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Clean up test windows (if any)
        if: always()
        run: |
          osascript -e 'tell application "System Events" to tell process "Python" to if exists then tell window 1 to close' || true
          sleep 2